# Use ITS for crypto storage of signature keys.
SB_CONFIG_MCUBOOT_SIGNATURE_USING_ITS=y

# The below kconfig enables build generate default ITS key file bundle,
# to be programmed to a device when sample is programmed with:
#  west flash --erase -d <build_dir>
# You should not use the option in production build as
# you are expected to have full control over key files.
SB_CONFIG_MCUBOOT_GENERATE_DEFAULT_KEY_FILE=y
