CONFIG_NCS_SAMPLES_DEFAULTS=y

# BLE peripheral acts as the "coexistence load" so MPSL/SDC and the radio
# are active while the RT component runs from a zero-latency interrupt.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Nordic_RT_FW"
CONFIG_BT_LBS=y
CONFIG_DK_LIBRARY=y

# The RT fast path depends on Zero-latency IRQs.
CONFIG_ZERO_LATENCY_IRQS=y

# Runtime control plane is exposed through the shell.
CONFIG_SHELL=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# NOTE: the RT fast path drives TIMER directly through the nrfx HAL and
# installs its own IRQ_DIRECT_CONNECT zero-latency handler.
# The nrfx_timer driver is intentionally NOT enabled, because its
# event dispatcher is incompatible with a minimal ZLI ISR.
