#
# On nRF54H20 the Bluetooth controller runs on the radio core. This sample is a
# single application-core image, so the optional BLE coexistence load is
# disabled here. The RT mechanism (timer + ZLI + GPIO + control/data plane) is
# exercised on its own. The coexistence scenario is demonstrated on the nRF54L
# target where MPSL shares the application core.
#
CONFIG_BT=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_LBS=n
