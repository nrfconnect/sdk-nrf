CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Use deferred logging
CONFIG_NCS_SAMPLES_DEFAULTS=n
CONFIG_LOG=y
CONFIG_ASSERT=y
CONFIG_ASSERT_NO_COND_INFO=y
CONFIG_ASSERT_NO_MSG_INFO=y
CONFIG_HW_STACK_PROTECTION=y

# Enable the Zephyr drivers required by the speaker, battery module and motion detector module.
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME680=n
CONFIG_ADXL367=y

CONFIG_ADXL367_TRIGGER_OWN_THREAD=y
# The inactivity detection in dynamic environments using ADXL367 interrupts
# is buggy and not reliable.
CONFIG_ADXL367_ACTIVITY_DETECTION_MODE=n
CONFIG_ADXL367_INACTIVITY_DETECTION_MODE=n

# Enable accelerometer to angle conversion for the motion detection module.
CONFIG_ACCEL_TO_ANGLE=y

# Adjust the FHN ringing configuration to align it with the platform`s capabilities.
CONFIG_BT_FAST_PAIR_FHN_RING_COMP_ONE=y
CONFIG_BT_FAST_PAIR_FHN_RING_VOLUME=n
