CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Enable the Zephyr drivers required by the battery module and motion detector module.
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME680=n
CONFIG_ADXL367=y

# Enable the Zephyr drivers required by the battery monitoring module.
CONFIG_ADC=y
CONFIG_VOLTAGE_DIVIDER=y
CONFIG_FUEL_GAUGE=y
CONFIG_FUEL_GAUGE_COMPOSITE=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

CONFIG_ADXL367_TRIGGER_OWN_THREAD=y
# The inactivity detection in dynamic environments using ADXL367 interrupts
# is buggy and not reliable.
CONFIG_ADXL367_ACTIVITY_DETECTION_MODE=n
CONFIG_ADXL367_INACTIVITY_DETECTION_MODE=n

# Enable accelerometer to angle conversion for the motion detection module.
CONFIG_ACCEL_TO_ANGLE=y

# Adjust the FHN ringing configuration to align it with the platform`s capabilities.
CONFIG_BT_FAST_PAIR_FHN_RING_COMP_ONE=y
CONFIG_BT_FAST_PAIR_FHN_RING_VOLUME=n

# Align the advertised TX power with Fast Pair expectations.
CONFIG_BT_ADV_PROV_TX_POWER_CORRECTION_VAL=-13
CONFIG_BT_FAST_PAIR_FHN_TX_POWER_CORRECTION_VAL=-13

# Enable code partitioning with DTS
CONFIG_USE_DT_CODE_PARTITION=y
