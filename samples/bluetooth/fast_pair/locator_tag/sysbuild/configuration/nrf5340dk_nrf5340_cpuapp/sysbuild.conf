SB_CONFIG_PARTITION_MANAGER=n

SB_CONFIG_NETCORE_IPC_RADIO=y

SB_CONFIG_BOOTLOADER_MCUBOOT=y

# The MCUboot secondary slot resides in external flash.
# Enable the multi-image update mode on the network core to allow updating
# both the application and network core images in a single OTA operation.
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y
SB_CONFIG_MCUBOOT_UPDATEABLE_IMAGES=2
SB_CONFIG_MCUBOOT_NRF53_MULTI_IMAGE_UPDATE=y

SB_CONFIG_SECURE_BOOT_NETCORE=y
SB_CONFIG_NETCORE_APP_UPDATE=y

SB_CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="\${SB_APPLICATION_CONFIG_DIR}/boot_signature_key_file_rsa2048.pem"
