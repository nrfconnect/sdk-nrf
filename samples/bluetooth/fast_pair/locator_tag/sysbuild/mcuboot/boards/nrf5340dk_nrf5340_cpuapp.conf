# Set the maximum number of sectors per image slot explicitly. The auto-compute
# (CONFIG_BOOT_MAX_IMG_SECTORS_AUTO) cannot determine the erase block size of
# slot1_partition / slot3_partition because the nordic,qspi-nor binding does
# not declare erase-block-size (the driver discovers it from SFDP at runtime).
# 956 KiB slot / 4 KiB sector = 239 sectors.
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=239

# Required by QSPI
CONFIG_CLOCK_CONTROL=y
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_NRF_RTC_TIMER=y
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_NORDIC_QSPI_NOR_STACK_WRITE_BUFFER_SIZE=16

# Use the image header load address (instead of the reset vector) to verify
# that the image in the secondary slot targets the correct primary slot.
# Required for the network core image slot, where the load address must match
# the NETCPU_APP_SLOT range derived from the b0n s0_partition DTS node.
# CONFIG_MCUBOOT_VERIFY_IMG_ADDRESS is the deprecated predecessor of this
# option and must be disabled explicitly because it otherwise auto-defaults
# to y in the overwrite-only mode (CONFIG_BOOT_UPGRADE_ONLY=y).
CONFIG_MCUBOOT_CHECK_HEADER_LOAD_ADDRESS=y
CONFIG_MCUBOOT_VERIFY_IMG_ADDRESS=n

# Use FPROTECT region protection on nRF53 targets.
CONFIG_FPROTECT=y
