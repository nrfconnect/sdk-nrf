################################################################################
# Application overlay - Thingy:53 DFU

CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

################################################################################
# Configure USB CDC ACM

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_MULTIPLE_INSTANCES=y
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="Thingy:53 Nordic UART Service sample"
CONFIG_CDC_ACM_SERIAL_PID=0x530E
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

# Enable back logging over UART as this sample config uses only RTT by default
CONFIG_LOG_BACKEND_UART=y

CONFIG_UART_LINE_CTRL=y
CONFIG_UART_ASYNC_ADAPTER=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Disable the UARTE enabled in default project configuration
CONFIG_UART_NRFX=n
