    platform_allow: nrf5340dk/nrf5340/cpunet
  sample.bluetooth.direct_test_mode.nrf5340_nrf21540.no_automatic_power:
    sysbuild: true
    build_only: true
    extra_args: SHIELD=nrf21540ek
    extra_configs:
      - CONFIG_CLOCK_CONTROL_NRF=n
