# nRF7120 keeps its non-volatile settings in MRAM, which is byte-addressable and
# does not follow the flash sector erase model. Use the ZMS settings backend
# (the recommended backend for MRAM-based SoCs) instead of NVS, and disable the
# NRF flash partial-erase workaround which does not apply to MRAM.
CONFIG_SOC_FLASH_NRF_PARTIAL_ERASE=n
CONFIG_NVS=n
CONFIG_NVS_LOOKUP_CACHE=n
CONFIG_SETTINGS_NVS_NAME_CACHE=n
CONFIG_ZMS=y
CONFIG_SETTINGS_ZMS_CUSTOM_SECTOR_COUNT=y
CONFIG_SETTINGS_ZMS_SECTOR_COUNT=8
CONFIG_ZMS_LOOKUP_CACHE=y
CONFIG_ZMS_LOOKUP_CACHE_SIZE=512
CONFIG_ZMS_LOOKUP_CACHE_FOR_SETTINGS=y

# The DFU distributor receives and reassembles a firmware image over Bluetooth,
# which needs more system work-queue and Bluetooth RX thread stack than default.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=5120
