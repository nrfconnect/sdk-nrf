# Development-oriented options: asserts, UART logging (async), and DBG level
# for this sample and nRF RPC modules. For manual use, pass e.g.:
#   -- -DEXTRA_CONF_FILE=verbose.conf

# Enable asserts
CONFIG_ASSERT=y

# Enable UART console. Use async API to reduce CPU load.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_ASYNC_API=y
CONFIG_LOG_BACKEND_UART_ASYNC=y

# Verbose (DBG) logging for this sample and RPC stack
CONFIG_NRF_PS_SERVER_LOG_LEVEL_DBG=y
CONFIG_NRF_RPC_TR_LOG_LEVEL_DBG=y
CONFIG_NRF_RPC_LOG_LEVEL_DBG=y
CONFIG_NRF_RPC_OS_LOG_LEVEL_DBG=y
