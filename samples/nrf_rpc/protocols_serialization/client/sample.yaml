sample:
  name: Protocols serialization client sample
  description: Demonstrates serialization of Bluetooth LE and OpenThread API using
    nRF RPC

common:
  sysbuild: true
  build_only: true
  platform_allow:
    - nrf52840dk/nrf52840
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54lm20dk/nrf54lm20b/cpuapp
  integration_platforms:
    - nrf52840dk/nrf52840
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54lm20dk/nrf54lm20b/cpuapp
  tags:
    - ci_build
    - ci_samples_nrf_rpc

tests:
  sample.nrf_rpc.protocols_serialization.client.rpc_ble:
    extra_args:
      - EXTRA_CONF_FILE=ble.conf
  sample.nrf_rpc.protocols_serialization.client.rpc_ot:
    extra_args:
      - EXTRA_CONF_FILE=openthread.conf
  sample.nrf_rpc.protocols_serialization.client.rpc:
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE=coex.overlay
      - EXTRA_CONF_FILE="ble.conf;openthread.conf;verbose.conf;log_rpc.conf;coex.conf"
  sample.nrf_rpc.protocols_serialization.client.rpc_ci:
    extra_args:
      - SNIPPET="ci-shell;zperf"
      - EXTRA_DTC_OVERLAY_FILE=coex.overlay
      - EXTRA_CONF_FILE="ble.conf;openthread.conf;verbose.conf;log_rpc.conf;coex.conf"
    extra_configs:
      - CONFIG_NRF_RPC_UTILS_CRASH_GEN=y
