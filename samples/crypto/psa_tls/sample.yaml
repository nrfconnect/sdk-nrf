sample:
  description: |
    This sample demonstrates performing TLS handshake as either server or client.
  name: PSA TLS sample
common:
  sysbuild: true
  tags:
    - ci_build
    - sysbuild
    - ci_samples_crypto
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "Initializing network"
      - "psa_tls_sample: PSA TLS app started"
      - "psa_tls_credentials.* Registering"
      - "psa_tls_sample: Registering Pre-shared key"
      - "psa_.*(tls_client|tls_server).*TLS connection"
  timeout: 15
tests:
  ################################################################################
  ## ECDSA with Cryptocell and Oberon
  ################################################################################
  sample.psa_tls.tls_server.ecdsa.cc3xx_oberon:
    extra_args:
      EXTRA_CONF_FILE="overlays/server.conf;overlays/ecdsa_secp256r1.conf;overlays/tls_1_2_ecdsa.conf;overlays/cc3xx-oberon.conf"
    platform_allow: &cc3xx_oberon_platforms
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp/ns
      - nrf9160dk/nrf9160
      - nrf9160dk/nrf9160/ns
      - nrf9161dk/nrf9161
      - nrf9161dk/nrf9161/ns
      - nrf9151dk/nrf9151
      - nrf9151dk/nrf9151/ns
    integration_platforms: &nrf5340_integration_platforms
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp/ns
    tags:
      - cc3xx_oberon
  sample.psa_tls.dtls_server.ecdsa.cc3xx_oberon:
    extra_args:
      EXTRA_CONF_FILE="overlays/server.conf;overlays/ecdsa_secp256r1.conf;overlays/tls_1_2_ecdsa.conf;overlays/cc3xx-oberon.conf;overlays/dtls.conf"
    platform_allow: *cc3xx_oberon_platforms
    integration_platforms: &nrf9160_integration_platforms
      - nrf9160dk/nrf9160
      - nrf9160dk/nrf9160/ns
    tags:
      - dtls
      - cc3xx_oberon
  sample.psa_tls.tls_server_secp384r1.ecdsa.cc3xx_oberon:
    extra_args:
      EXTRA_CONF_FILE="overlays/server.conf;overlays/ecdsa_secp384r1.conf;overlays/tls_1_2_ecdsa.conf;overlays/cc3xx-oberon.conf"
    platform_allow: *cc3xx_oberon_platforms
    integration_platforms: &nrf9161_integration_platforms
      - nrf9161dk/nrf9161
      - nrf9161dk/nrf9161/ns
    tags:
      - cc3xx_oberon
      - secp384r1
  sample.psa_tls.dtls_server_secp384r1.ecdsa.cc3xx_oberon:
    extra_args:
      EXTRA_CONF_FILE="overlays/server.conf;overlays/ecdsa_secp384r1.conf;overlays/tls_1_2_ecdsa.conf;overlays/cc3xx-oberon.conf;overlays/dtls.conf"
    platform_allow: *cc3xx_oberon_platforms
