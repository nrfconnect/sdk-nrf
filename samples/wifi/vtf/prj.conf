# Tier 1: built-in, devicetree-selected sensor provider.
CONFIG_VTF_MONITORING=y
CONFIG_VTF_DIE_TEMP_MONITOR=y

# Tier 2: custom registered provider (mock battery, see
# src/mock_battery_provider.c). VTF_BATTERY_VOLTAGE_MONITOR itself
# carries no code in the driver; it gates this sample's own provider.
CONFIG_VTF_BATTERY_VOLTAGE_MONITOR=y

# Keep the die-temp sensor's own refresh rate in step with the
# snapshot interval below, otherwise the logged die-temp value only
# changes once every few log lines while battery voltage changes every
# line.
CONFIG_VTF_DIE_TEMP_MONITOR_INTERVAL_MS=2000
CONFIG_VTF_SNAPSHOT_INTERVAL_MS=2000

CONFIG_LOG=y
CONFIG_PRINTK=y
