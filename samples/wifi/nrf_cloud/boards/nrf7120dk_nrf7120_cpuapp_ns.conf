# MM_IOVEC is not compatible with TFM_ITS_ENCRYPTED
CONFIG_TFM_PSA_FRAMEWORK_HAS_MM_IOVEC=n
# Necessary for TLS with MM-less IOVEC.
# 36864 = 2 * MBEDTLS_SSL_MAX_CONTENT_LEN (16384) + overhead
CONFIG_TFM_CRYPTO_IOVEC_BUFFER_SIZE=36864

# pk_wrap.c uses PSA_ALG_ECDSA_ANY for X.509 certificate chain verification.
CONFIG_PSA_WANT_ALG_ECDSA_ANY=y

# FOTA requires MCUBoot; this sample uses BOOTLOADER_NONE on nrf7120dk.
# Disabling NRF_CLOUD_FOTA also avoids pulling in FW_INFO, which has no
# SOC_SERIES_NRF71 defaults and causes both a CMake and a linker error.
CONFIG_NRF_CLOUD_FOTA=n

# No Flash driver in NS yet, use PSA for settings for now.
CONFIG_SETTINGS_TFM_PSA=y
