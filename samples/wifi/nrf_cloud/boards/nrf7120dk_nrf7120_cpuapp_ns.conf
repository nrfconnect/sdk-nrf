# nRF7120 (SOC_SERIES_NRF71) defaults TFM_ITS_ENCRYPTED=y, which conflicts with
# PSA_FRAMEWORK_HAS_MM_IOVEC (enabled in prj.conf for TF-M RAM savings).
CONFIG_TFM_ITS_ENCRYPTED=n

# FOTA requires MCUBoot; this sample uses BOOTLOADER_NONE on nrf7120dk.
# Disabling NRF_CLOUD_FOTA also avoids pulling in FW_INFO, which has no
# SOC_SERIES_NRF71 defaults and causes both a CMake and a linker error.
CONFIG_NRF_CLOUD_FOTA=n

# Optimize Wi-Fi stack to save RAM (nRF7120 NS partition is 408 KB after DTS adjustment)
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=59856
CONFIG_NRF71_RX_NUM_BUFS=6
CONFIG_NRF71_MAX_TX_AGGREGATION=1
CONFIG_HEAP_MEM_POOL_SIZE=40144

# Reduce networking buffer counts
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_NET_BUF_RX_COUNT=6
CONFIG_NET_MAX_CONN=6
CONFIG_NET_MAX_CONTEXTS=5

# POSIX API memory optimizations
CONFIG_POSIX_FD_MGMT=n
CONFIG_POSIX_MESSAGE_PASSING=n
CONFIG_POSIX_THREAD_THREADS_MAX=0
