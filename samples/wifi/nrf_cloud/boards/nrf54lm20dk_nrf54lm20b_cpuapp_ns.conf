# TF-M for nRF54LM20 unconditionally enables ITS_ENCRYPTION by default (SOC_SERIES_NRF54L).
# TF-M rejects the combination of ITS_ENCRYPTION and PSA_FRAMEWORK_HAS_MM_IOVEC (which
# prj.conf enables for TF-M RAM savings). Disable ITS encryption to resolve the conflict;
# TLS credentials are stored in PS (Protected Storage), not ITS, so this is safe.
CONFIG_TFM_ITS_ENCRYPTED=n
