# Log level
# For more verbose and detailed log output, set the log level to
# CONFIG_WIFI_NRF_CLOUD_LOG_LEVEL_DBG=y instead.
CONFIG_WIFI_NRF_CLOUD_LOG_LEVEL_INF=y

# General config
CONFIG_EVENTS=y
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_RESET_ON_FATAL_ERROR=y
CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_DK_LIBRARY=y

# Improved Logging
# CONFIG_LOG_MODE_DEFERRED allows logging from multiple threads simultaneously without creating
# splintered log entries, at the cost of needing a buffer for storing logs.
CONFIG_LOG_MODE_DEFERRED=y

# CONFIG_LOG_BUFFER_SIZE is the aforementioned buffer. A size of 4096 bytes is useful for debugging
# and prototyping, but is probably more than necessary for production-ready firmware.
CONFIG_LOG_BUFFER_SIZE=4096

# Heap and stacks
# Extended memory heap size needed for Wi-Fi operation and encoding JSON-based nRF Cloud Device Messages.
# Add 256 bytes for each additional scanning result (CONFIG_NRF_WIFI_SCAN_MAX_BSS_CNT),
# assuming sane SSID lengths.
CONFIG_HEAP_MEM_POOL_SIZE=40144
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048

# Enable Networking and Connection Manager.
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=n
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=30
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=6144
CONFIG_NET_CONNECTION_MANAGER=y

CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV6_NBR_CACHE=n
CONFIG_NET_IPV6_MLD=n

# DNS
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=30000

# Wi-Fi drivers (nRF70x)
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NRF70_SKIP_LOCAL_ADMIN_MAC=y

# Wi-Fi conn_mgr bindings
CONFIG_L2_WIFI_CONNECTIVITY=y

# Wi-Fi credentials (simplified Wi-Fi connection setup)
CONFIG_WIFI_CREDENTIALS=y

# Wi-Fi networking and native networking stack
# Note: WIFI_NM_WPA_SUPPLICANT requires 24kB of unused RAM in the final build.
# Memory allocations are fine-tuned with that fact in mind.
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_NATIVE=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_CONTEXT_SNDTIMEO=y
CONFIG_NET_TCP=y
CONFIG_NET_DHCPV4=y

# MBEDTLS base configuration for Wi-Fi TLS/DTLS
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_HEAP_SIZE=80000
# PEM parsing is required for TLS credentials provisioned via the shell
CONFIG_MBEDTLS_PEM_PARSE_C=y
# Ciphersuite for MQTT
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256=y
CONFIG_PSA_WANT_ALG_ECDSA=y
# PBKDF2-HMAC is needed for WPA2-PSK passphrase hashing (pbkdf2_sha1)
CONFIG_PSA_WANT_ALG_PBKDF2_HMAC=y
CONFIG_PSA_WANT_ALG_PBKDF2_AES_CMAC_PRF_128=y

# Wait for credential installation to be complete before connecting to nRF Cloud
CONFIG_NRF_CLOUD_CHECK_CREDENTIALS=y

# nRF Cloud
CONFIG_NRF_CLOUD=y
CONFIG_NRF_CLOUD_MQTT=y

# Use compile-time client ID for nRF Cloud
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_HW_ID=y
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_DEVICE_ID=y

# Location Services configuration
CONFIG_LOCATION=y
CONFIG_NRF_CLOUD_LOCATION=y
CONFIG_LOCATION_METHOD_WIFI=y
# Keep CONFIG_NRF_WIFI_SCAN_MAX_BSS_CNT and CONFIG_LOCATION_METHOD_WIFI_SCANNING_RESULTS_MAX_CNT
# set to the same value.
CONFIG_NRF_WIFI_SCAN_MAX_BSS_CNT=10
CONFIG_LOCATION_METHOD_WIFI_SCANNING_RESULTS_MAX_CNT=10

# Date Time lib - Used by main application
CONFIG_DATE_TIME=y
# Enable date_time retries for Wi-Fi
# This prevents occasional DNS lookup flukes from
# rendering the device unable to connect until the next
# CONFIG_DATE_TIME_UPDATE_INTERVAL_SECONDS elapses (default 4 hours)
CONFIG_DATE_TIME_RETRY_COUNT=5
# Use a really short retry interval for demo purposes
# 60 seconds to 15 minutes is probably more appropriate for real-world applications
CONFIG_DATE_TIME_RETRY_INTERVAL_SECONDS=20

# Settings - NVS is used (required by WIFI_CREDENTIALS)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# TFM and Trusted Execution (required for Protected Storage credential management)
# Note: even when using Protected Storage, credentials are still retrieved into insecure
# memory when in use.
CONFIG_BUILD_WITH_TFM=y
CONFIG_TRUSTED_EXECUTION_NONSECURE=y
CONFIG_TFM_PARTITION_PROTECTED_STORAGE=y
# The NOT_SET profile enables all features; we reduce some settings below to save flash and RAM.
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
CONFIG_TFM_CRYPTO_ASYM_SIGN_MODULE_ENABLED=y

# Credential management shells
CONFIG_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_WIFI_CREDENTIALS_SHELL=y
CONFIG_TLS_CREDENTIALS_SHELL=y
# "net iface" shows MAC + IP; "net ping" useful for connectivity checks
CONFIG_NET_SHELL=y
CONFIG_DEVMEM_SHELL=n
CONFIG_TLS_CREDENTIALS_BACKEND_PROTECTED_STORAGE=y
# Increased stack size needed for wifi_cred auto_connect command
CONFIG_SHELL_STACK_SIZE=6144
# nRFCloud credentials can exceed 1024 bytes
CONFIG_TLS_CREDENTIALS_SHELL_CRED_BUF_SIZE=3072
# Needed by the TLS credentials shell
CONFIG_BASE64=y

# Miscellaneous resource allocation tweaks needed to support Wi-Fi
CONFIG_MESSAGE_THREAD_STACK_SIZE=2048
CONFIG_CONNECTION_THREAD_STACK_SIZE=6144
CONFIG_DATE_TIME_THREAD_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=1024
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=6144
CONFIG_L2_WIFI_CONN_WQ_STACK_SIZE=512
CONFIG_LOCATION_WORKQUEUE_STACK_SIZE=2048
CONFIG_ZVFS_POLL_MAX=8

## TF-M: keep IPC mode (default) for the MQTT build. Enable MM-IOVEC to save RAM.
CONFIG_TFM_PSA_FRAMEWORK_HAS_MM_IOVEC=y

## Re-enable IPv6 neighbor cache and MLD (disabled above by default)
CONFIG_NET_IPV6_NBR_CACHE=y
CONFIG_NET_IPV6_MLD=y

## Configure MBEDTLS for MQTT/TLS (CoAP overlay overrides these)
CONFIG_MQTT_LIB_TLS=y
CONFIG_MBEDTLS_SSL_SRV_C=n
CONFIG_MBEDTLS_SSL_COOKIE_C=n

## nRF700x memory allocation (CoAP overlay overrides these)
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=15000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=97856

## Thread stack sizes (CoAP overlay overrides APPLICATION_THREAD, NET_MGMT_EVENT, CONNECTION_THREAD)
CONFIG_APPLICATION_THREAD_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_STACK_SIZE=8192
