CONFIG_WIFI_NRF71=y
CONFIG_NRF71_AP_MODE=y
CONFIG_NRF71_RX_NUM_BUFS=16
CONFIG_NRF71_MAX_TX_AGGREGATION=4
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=90000

# nRF7120 (SOC_SERIES_NRF71) defaults TFM_ITS_ENCRYPTED=y, which conflicts with
# PSA_FRAMEWORK_HAS_MM_IOVEC (enabled via TFM_PROFILE_TYPE_SMALL in prj.conf).
# TLS credentials use PS (Protected Storage), not ITS, so disabling ITS encryption
# is safe here.
CONFIG_TFM_ITS_ENCRYPTED=n

CONFIG_DK_LIBRARY=n
