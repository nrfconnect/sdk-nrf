# Empty idle image for the radio core. Mirrors the remote configuration of the
# multicore idle benchmark (s2ram scenario) so the radio core reaches low power.

CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME_ASYNC=n
CONFIG_POWEROFF=y

CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_GPIO=n
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n
