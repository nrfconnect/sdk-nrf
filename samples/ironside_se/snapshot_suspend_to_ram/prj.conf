# Low-power (suspend-to-RAM) configuration mirrored from
# tests/benchmarks/multicore/idle, scenario
# benchmarks.multicore.idle.nrf54h20dk_cpuapp_cpurad.s2ram.
#
# To reach the lowest idle current on the nRF54H20 all cores must be idle, so
# this sample owns the radio core (CONFIG_SOC_NRF54H20_CPURAD_ENABLE) and runs
# an empty idle image on it (see remote/, selected via SB_CONFIG_NETCORE_REMOTE
# in sysbuild.conf). Serial, console, GPIO and the boot banner are disabled to
# shave off the last microamps, exactly like the low-power benchmark. As a
# consequence the sample runs without any console output.
#
# PROTECTEDMEM and UICR.SNAPSHOT.REGIONS are configured from the UICR image;
# see sysbuild/uicr.conf.

# sys_reboot() is used in the capture/recovery flow.
CONFIG_REBOOT=y

# Enable and own the radio core so it can be kept idle (empty remote image).
CONFIG_SOC_NRF54H20_CPURAD_ENABLE=y

# Suspend-to-RAM / low-power.
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME_ASYNC=n
CONFIG_POWEROFF=y

# Disable serial/console/GPIO and banners to reach the lowest idle current.
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_GPIO=n
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n

CONFIG_MAIN_STACK_SIZE=2048
