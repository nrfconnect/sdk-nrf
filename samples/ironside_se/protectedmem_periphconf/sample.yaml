sample:
  name: Protected Memory PERIPHCONF Sample
  description: |
    Sample demonstrating UICR.PROTECTEDMEM protection of the periphconf_partition.
    The sample relocates periphconf_partition to be right after
    cpuapp_boot_partition and configures PROTECTEDMEM to protect both partitions.
    The sample writes to the protected area, reboots, and demonstrates that the
    integrity check fails on boot. The secondary firmware then reverts the
    corruption and reboots back into the primary firmware.

common:
  sysbuild: true
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "Writing test pattern to protected memory\\.\\.\\."
      - "Rebooting after 1s\\."
      - "Secondary: Secondary firmware booted"
      - "Secondary: Booted because of PROTECTEDMEM failure"
      - "Secondary: Rebooting after 1s\\."

tests:
  samples.protectedmem_periphconf.nrf54h20dk:
    tags:
      - sysbuild
      - ci_samples_sdfw
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    timeout: 7
