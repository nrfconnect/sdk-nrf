sample:
  name: IronSide SE snapshot capture and recover
  description: |
    Demonstrates IronSide SE snapshot capture and recovery.

common:
  sysbuild: true

tests:
  samples.ironside_se.snapshot_capture_recover:
    build_only: true
    tags:
      - sysbuild
      - ironside_se
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    timeout: 30
