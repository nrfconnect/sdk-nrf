# Enable UICR generator options - this is automatically set when building
# the gen_uicr image and enables the UICR generator configuration menu
CONFIG_IS_GEN_UICR_IMAGE=y

# Everything above this is from zephyr/soc/nordic/common/uicr/gen_uicr/prj.conf.

# CONFIG_GEN_UICR_CUSTOMER_BIN_FILE will resolve relative paths to the uicr
# project folder. Putting customer.bin in this sysbuild/uicr folder, so it
# will overlay the uicr image.

CONFIG_GEN_UICR_CUSTOMER=y
CONFIG_GEN_UICR_CUSTOMER_BIN_FILE="customer.bin"
