# FOTA not yet supported
CONFIG_MOSH_FOTA=n
CONFIG_FOTA_DOWNLOAD=n

# Use ZMS instead of NVS for storage, because it's better suited for MRAM
CONFIG_ZMS=y
CONFIG_ZMS_LOG_LEVEL_WRN=y
CONFIG_NVS=n

CONFIG_LOCATION_METHOD_WIFI=y

# See comment for CONFIG_HEAP_MEM_POOL_SIZE.
CONFIG_LOCATION_METHOD_WIFI_SCANNING_RESULTS_MAX_CNT=50
CONFIG_LOCATION_WORKQUEUE_STACK_SIZE=8192

# Wi-Fi
CONFIG_WIFI=y
CONFIG_WIFI_NRF92=y

# Wi-Fi shell
CONFIG_NET_L2_WIFI_SHELL=y
# Should be set when CONFIG_NET_L2_WIFI_SHELL is enabled.
# Printing 'wifi scan' command results puts pressure on queues in new locking design in net_mgmt.
# So, use a typical number of networks in a crowded environment as the queue depth.
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=50

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_DUMMY=y
CONFIG_NET_OFFLOAD=y

# Memory configurations
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024

# Wi-Fi shell sample has 25000 heap size. We need a bit more for location request purposes.
# Heap allocation should be changed when CONFIG_LOCATION_METHOD_WIFI_SCANNING_RESULTS_MAX_CNT
# is changed. In modem shell, it looks like 10 APs requires ~4500 bytes to give some rough numbers.
CONFIG_HEAP_MEM_POOL_SIZE=40000
