# PGNSS overlay configuration

# Enable nRF Cloud assistance for GNSS sample
CONFIG_GNSS_SAMPLE_ASSISTANCE_NRF_CLOUD=y

# PGNSS
CONFIG_NRF_CLOUD_PGNSS=y
CONFIG_NRF_CLOUD_PGNSS_REPLACEMENT_THRESHOLD=4

# PGNSS downloads over CoAP require larger option values than the default.
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=80

# Disable A-GNSS, comment this if you want to use both A-GNSS and PGNSS at the same time
CONFIG_NRF_CLOUD_AGNSS=n

# Storage for PGNSS
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_FCB=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# PGNSS needs more heap
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Download Client - used by PGNSS
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_STACK_SIZE=1280
CONFIG_DOWNLOADER_MAX_HOSTNAME_SIZE=128
