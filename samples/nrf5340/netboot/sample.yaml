sample:
  name: Network core bootloader sample
  description: Network core bootloader sample for nRF5340
tests:
  sample.nrf5340.netboot:
    sysbuild: true
    build_only: true
    integration_platforms:
      - nrf5340dk/nrf5340/cpunet
    platform_allow:
      - nrf5340dk/nrf5340/cpunet
    extra_args:
      - DTC_OVERLAY_FILE="app_test.overlay"
    tags:
      - ci_build
      - sysbuild
      - ci_samples_nrf5340
  sample.nrf5340.netboot.minimal_size:
    sysbuild: true
    build_only: true
    extra_args:
      - DTC_OVERLAY_FILE="app_test.overlay"
      - EXTRA_CONF_FILE="minimal-size.conf"
    integration_platforms:
      - nrf5340dk/nrf5340/cpunet
    platform_allow:
      - nrf5340dk/nrf5340/cpunet
    tags:
      - ci_build
      - sysbuild
      - ci_samples_nrf5340
