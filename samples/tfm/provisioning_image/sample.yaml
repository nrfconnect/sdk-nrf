sample:
  description: Initiates the provisioning of a TF-M image.
  name: Provisioning Image
common:
  tags:
    - keys
    - ci_samples_tfm
  platform_allow:
    - nrf5340dk/nrf5340/cpuapp
    - nrf9151dk/nrf9151
    - nrf9160dk/nrf9160
    - nrf9161dk/nrf9161
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf54lv10dk/nrf54lv10a/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54lm20dk/nrf54lm20b/cpuapp
  harness: console
tests:
  sample.tfm.provisioning_image:
    sysbuild: true
    tags:
      - keys
      - ci_build
      - sysbuild
      - ci_samples_tfm
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf9151dk/nrf9151
      - nrf9160dk/nrf9160
      - nrf9161dk/nrf9161
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
      - nrf9151dk/nrf9151
      - nrf9160dk/nrf9160
      - nrf9161dk/nrf9161
    harness_config:
      type: multi_line
      regex:
        - "Writing the identity key to KMU"
        - "Success!"
  sample.tfm.provisioning_image.nrf54l:
    sysbuild: true
    tags:
      - keys
      - ci_build
      - sysbuild
      - ci_samples_tfm
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lv10dk/nrf54lv10a/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lv10dk/nrf54lv10a/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    harness_config:
      type: one_line
      regex:
        - "Success!"
