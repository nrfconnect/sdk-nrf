sample:
  description: Hello World sample, the simplest Zephyr
    application, with TF-M enabled
  name: hello world TFM
common:
  tags: tfm
  platform_allow: nrf5340dk_nrf5340_cpuapp_ns nrf9160dk_nrf9160_ns
  integration_platforms:
    - nrf5340dk_nrf5340_cpuapp_ns
    - nrf9160dk_nrf9160_ns
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Hello World! .*"
      - "Reading some secure memory that NS is allowed to read"
      - ".*"
      - "FICR->INFO.RAM: 0x[0-9a-f]{8}"
      - "FICR->INFO.FLASH: 0x[0-9a-f]{8}"
      - "Generating random number"
      - "0x[0-9a-f]{64}"
      - "MCU selection .*"
tests:
  sample.tfm.helloworld:
    tags: ci_build
  sample.tfm.helloworld.sysbuild:
    sysbuild: true
    tags: ci_build sysbuild
  sample.tfm.hello_world.bootloaders:
    tags: ci_build
    extra_args: CONFIG_BOOTLOADER_MCUBOOT=y CONFIG_SECURE_BOOT=y
  sample.tfm.hello_world.bootloaders.sysbuild:
    sysbuild: true
    tags: ci_build sysbuild
    extra_args: CONFIG_BOOTLOADER_MCUBOOT=y CONFIG_SECURE_BOOT=y
  sample.tfm.hello_world.bootloaders_debug:
    build_only: true
    tags: ci_build
    extra_args: CONFIG_BOOTLOADER_MCUBOOT=y CONFIG_SECURE_BOOT=y CONFIG_DEBUG_OPTIMIZATIONS=y
  sample.tfm.hello_world.bootloaders_debug.sysbuild:
    sysbuild: true
    build_only: true
    tags: ci_build sysbuild
    extra_args: CONFIG_BOOTLOADER_MCUBOOT=y CONFIG_SECURE_BOOT=y CONFIG_DEBUG_OPTIMIZATIONS=y
  sample.tfm.hello_world.full:
    tags: ci_build
    extra_args: CONFIG_TFM_PROFILE_TYPE_NOT_SET=y CONFIG_NRF_SECURITY=y
  sample.tfm.hello_world.full.sysbuild:
    sysbuild: true
    tags: ci_build sysbuild
    extra_args: CONFIG_TFM_PROFILE_TYPE_NOT_SET=y CONFIG_NRF_SECURITY=y
  sample.tfm.hello_world.lvl2:
    tags: ci_build
    extra_args: CONFIG_TFM_IPC=y CONFIG_TFM_ISOLATION_LEVEL=2 CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
  sample.tfm.hello_world.lvl2.sysbuild:
    sysbuild: true
    tags: ci_build sysbuild
    extra_args: CONFIG_TFM_IPC=y CONFIG_TFM_ISOLATION_LEVEL=2 CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
