sample:
  description: TF-M PSA Template
  name: TF-M PSA Template
common:
  tags:
    - tfm
    - ci_samples_tfm
  platform_allow:
    - nrf5340dk/nrf5340/cpuapp/ns
    - nrf9151dk/nrf9151/ns
    - nrf9160dk/nrf9160/ns
    - nrf9161dk/nrf9161/ns
    - nrf54l15dk/nrf54l15/cpuapp/ns
    - nrf54lv10dk/nrf54lv10a/cpuapp/ns
    - nrf54lm20dk/nrf54lm20a/cpuapp/ns
    - nrf54lm20dk/nrf54lm20b/cpuapp/ns
  integration_platforms:
    - nrf5340dk/nrf5340/cpuapp/ns
    - nrf9151dk/nrf9151/ns
    - nrf9160dk/nrf9160/ns
    - nrf9161dk/nrf9161/ns
    - nrf54l15dk/nrf54l15/cpuapp/ns
    - nrf54lv10dk/nrf54lv10a/cpuapp/ns
    - nrf54lm20dk/nrf54lm20a/cpuapp/ns
    - nrf54lm20dk/nrf54lm20b/cpuapp/ns
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Requesting initial attestation token with [0-9]+ byte challenge\\."
      - "Received initial attestation token of [0-9]+ bytes\\."
tests:
  sample.tfm.psa_template:
    sysbuild: true
    tags:
      - ci_build
      - sysbuild
      - ci_samples_tfm
