# MCUboot on nRF54L is signed by NSIB (b0) into the s0/s1 slot pair, so the s1
# image carries an extra ~0x630-byte trailer on top of the MCUboot binary. The
# size must also satisfy size mod 0x1000 == 0x800 to keep s0 and s1 equally
# sized after partition manager applies the 0x1000 end alignment to mcuboot;
# any other value introduces an EMPTY pad before s0_image and trips the
# BUILD_ASSERT(S0_SIZE == S1_SIZE) check in bl_validation. 0xe800 is the
# smallest such value that fits MCUboot+trailer with FIH profile medium.
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0xe800
CONFIG_BOOT_MAX_IMG_SECTORS=256

# nRF54L uses hardware ACL for memory protection; FPROTECT is not needed.
CONFIG_FPROTECT=n
