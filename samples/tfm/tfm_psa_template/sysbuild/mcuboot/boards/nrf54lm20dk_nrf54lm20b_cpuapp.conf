# See nrf54l15dk_nrf54l15_cpuapp.conf for the rationale behind 0xe800.
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0xe800
CONFIG_BOOT_MAX_IMG_SECTORS=256

# nRF54L uses hardware ACL for memory protection; FPROTECT is not needed.
CONFIG_FPROTECT=n
