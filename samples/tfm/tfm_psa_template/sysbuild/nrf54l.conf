# nRF54L signs MCUboot with Ed25519 (the default for SOC_SERIES_NRF54L) over the
# full image rather than its hash (Pure mode).
SB_CONFIG_BOOT_SIGNATURE_TYPE_PURE=y

# Generate keyfile.json so that "west flash --recover" provisions the NSIB
# Ed25519 public key to CRACEN KMU. Without this, b0 fails validation (-102).
SB_CONFIG_SECURE_BOOT_GENERATE_DEFAULT_KMU_KEYFILE=y

# Sample development key. Replace for production use.
SB_CONFIG_SECURE_BOOT_SIGNING_KEY_FILE="../common/keys/nrf54l_nsib_sample_private.pem"

# Placeholder PSA certificate reference. nRF54L does not have a real
# PSA-certified value yet, and Kconfig.tfm only auto-defaults the string for
# nRF9160 and nRF5340; without an explicit value here, the build fails because
# SB_CONFIG_TFM_OTP_PSA_CERTIFICATE_REFERENCE=y in sysbuild.conf requires a
# non-empty value. Replace for production use.
SB_CONFIG_TFM_PSA_CERTIFICATE_REFERENCE_VALUE="0000000000000-00000"
