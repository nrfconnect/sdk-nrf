# nRF70 Wi-Fi driver tuning (external nRF7002 companion). Kept out of wifi.conf so it is
# only applied on nRF70 targets; the integrated nRF71 (nrf7120) uses its board conf instead.
CONFIG_NRF70_RX_NUM_BUFS=16
CONFIG_NRF70_MAX_TX_AGGREGATION=4
CONFIG_NRF70_BH_WQ_STACK_SIZE=2300
