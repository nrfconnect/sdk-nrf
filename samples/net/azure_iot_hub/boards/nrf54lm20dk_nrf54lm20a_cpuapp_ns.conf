# Necessary for TLS with MM-less IOVEC.
# 36864 = 2 * MBEDTLS_SSL_MAX_CONTENT_LEN (16384) + overhead
CONFIG_TFM_CRYPTO_IOVEC_BUFFER_SIZE=36864

# Configure TF-M
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
# TF-M and nRF7002EB2 shield use the same UART30. TF-M assigns UART30 to secure environment, which
# causes BusFault when app tries to access it. Disabling logging in TF-M prevent it using UART30.
CONFIG_TFM_LOG_LEVEL_SILENCE=y
