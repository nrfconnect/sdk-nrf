# NET sockets
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=3

CONFIG_MBEDTLS_HEAP_SIZE=81920
# Pregenerated credentials in the sample are PEM-encoded.
CONFIG_MBEDTLS_PEM_PARSE_C=y
# Set MPI (Multiple Precision Integer) size limit to 512 bytes for handling of 4 kb certificates
# in cryptographic operations.
CONFIG_MBEDTLS_MPI_MAX_SIZE=512
# TLS ciphersuites: the server presents an RSA-2048 certificate, so use ECDHE_RSA
# suites. Enable several so common clients (browsers/curl) can negotiate.
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256=y
# EC curve required for the ECDHE key exchange. P-256 is already implied by the
# ciphersuites above; P-384 is added explicitly.
CONFIG_PSA_WANT_ECC_SECP_R1_384=y
CONFIG_PSA_WANT_ALG_ECDSA_ANY=y
CONFIG_PSA_WANT_KEY_TYPE_CHACHA20=y
