# Configuration file for nRF9151 DK
# This file is merged with prj.conf in the application folder, and options
# set here will take precedence if they are present in both files.

# General
CONFIG_PICOLIBC=y

# The server doesn't support dual stack (IPv4/IPv6) on cellular.
CONFIG_NET_IPV6=n

# Zephyr NET Connection Manager and Connectivity layer.
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=1024
CONFIG_NRF_MODEM_LIB_NET_IF=y

# Disable PSM and eDRX to increase the servers latency.
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=n
CONFIG_LTE_LC_EDRX_MODULE=y
CONFIG_LTE_EDRX_REQ=n

# TF-M config
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y
