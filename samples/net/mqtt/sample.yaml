sample:
  name: mqtt
tests:
  sample.net.mqtt:
    sysbuild: true
    build_only: true
    build_on_all: true
    integration_platforms:
      - nrf9160dk/nrf9160/ns
      - nrf9151dk/nrf9151/ns
      - thingy91x/nrf9151/ns
      - native_sim
    platform_allow:
      - nrf9160dk/nrf9160/ns
      - nrf9161dk/nrf9161/ns
      - nrf9151dk/nrf9151/ns
      - thingy91/nrf9160/ns
      - thingy91x/nrf9151/ns
      - native_sim
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
  sample.net.mqtt.wifi:
    sysbuild: true
    build_only: true
    build_on_all: true
    integration_platforms:
      - nrf7002dk/nrf5340/cpuapp/ns
    platform_allow:
      - nrf7002dk/nrf5340/cpuapp/ns
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_EXTRA_CONF_FILE="wifi.conf;nrf70.conf"
  # nRF7120 uses the integrated nRF71 driver; its tuning lives in the board conf.
  sample.net.mqtt.nrf7120.wifi:
    sysbuild: true
    build_only: true
    build_on_all: true
    integration_platforms:
      - nrf7120dk/nrf7120/cpuapp/ns
    platform_allow:
      - nrf7120dk/nrf7120/cpuapp/ns
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_EXTRA_CONF_FILE=wifi.conf
  sample.net.mqtt.nrf70.tls:
    sysbuild: true
    build_only: true
    build_on_all: true
    integration_platforms:
      - nrf7002dk/nrf5340/cpuapp/ns
    platform_allow: nrf7002dk/nrf5340/cpuapp/ns
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_EXTRA_CONF_FILE="wifi.conf;wifi-tls.conf;nrf70.conf"
  sample.net.mqtt.nrf54h20.wifi:
    sysbuild: true
    build_only: true
    platform_allow: nrf54h20dk/nrf54h20/cpuapp
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_SHIELD="nrf7002eb_interposer_p1;nrf7002eb"
      - mqtt_SNIPPET="nrf70-wifi;wifi-credentials"
      - mqtt_EXTRA_CONF_FILE="wifi.conf;nrf70.conf"
  sample.net.mqtt.nrf54lm20_nrf7002eb2.wifi:
    sysbuild: true
    build_only: true
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_SHIELD="nrf7002eb2"
      - mqtt_SNIPPET=wifi-credentials
      - mqtt_EXTRA_CONF_FILE="wifi.conf;nrf70.conf"
  sample.net.mqtt.nrf54lm20_nrf7002eb2.wifi.tls:
    sysbuild: true
    build_only: true
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_SHIELD="nrf7002eb2"
      - mqtt_SNIPPET=wifi-credentials
      - mqtt_EXTRA_CONF_FILE="wifi.conf;wifi-tls.conf;nrf70.conf"
  sample.net.mqtt.nrf91.tls:
    sysbuild: true
    build_only: true
    build_on_all: true
    integration_platforms:
      - nrf9160dk/nrf9160/ns
      - nrf9161dk/nrf9161/ns
      - nrf9151dk/nrf9151/ns
      - thingy91/nrf9160/ns
      - thingy91x/nrf9151/ns
    platform_allow:
      - nrf9160dk/nrf9160/ns
      - nrf9161dk/nrf9161/ns
      - nrf9151dk/nrf9151/ns
      - thingy91/nrf9160/ns
      - thingy91x/nrf9151/ns
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args: EXTRA_CONF_FILE=overlay-tls-nrf91.conf
  sample.net.mqtt.native_sim.tls:
    sysbuild: true
    build_only: true
    build_on_all: true
    platform_allow: native_sim
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args: EXTRA_CONF_FILE=overlay-tls-native_sim.conf
  sample.net.mqtt.nrf7120.wifi.tls:
    sysbuild: true
    build_only: true
    build_on_all: true
    integration_platforms:
      - nrf7120dk/nrf7120/cpuapp/ns
    platform_allow:
      - nrf7120dk/nrf7120/cpuapp/ns
    tags:
      - ci_build
      - sysbuild
      - ci_samples_net
    extra_args:
      - mqtt_EXTRA_CONF_FILE="wifi.conf;wifi-tls.conf"
