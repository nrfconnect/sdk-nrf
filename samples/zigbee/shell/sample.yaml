sample:
  description: Zigbee application that includes all Zigbee shell commands
  name: Zigbee application with Zigbee shell
tests:
  sample.zigbee.shell:
    build_only: true
    integration_platforms:
      - nrf52840dk/nrf52840
      - nrf52833dk/nrf52833
      - nrf5340dk/nrf5340/cpuapp
      - nrf21540dk/nrf52840
    platform_allow: nrf52840dk/nrf52840 nrf52833dk/nrf52833 nrf5340dk/nrf5340/cpuapp
      nrf21540dk/nrf52840
    tags: ci_build shell
  sample.zigbee.shell.sysbuild:
    build_only: true
    sysbuild: true
    integration_platforms:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
    platform_allow: nrf52840dk/nrf52840 nrf5340dk/nrf5340/cpuapp
    tags: ci_build shell sysbuild
  sample.zigbee.shell.usb.nrf52840dk/nrf52840:
    build_only: true
    extra_args:
      CONF_FILE=prj_usb.conf
      DTC_OVERLAY_FILE="app_usb.overlay;boards/nrf52840dk/nrf52840.overlay"
    integration_platforms:
      - nrf52840dk/nrf52840
    platform_allow: nrf52840dk/nrf52840
    tags: ci_build shell
  sample.zigbee.shell.usb.nrf21540dk/nrf52840:
    build_only: true
    extra_args:
      CONF_FILE=prj_usb.conf
      DTC_OVERLAY_FILE="app_usb.overlay;boards/nrf21540dk/nrf52840.overlay"
    integration_platforms:
      - nrf21540dk/nrf52840
    platform_allow: nrf21540dk/nrf52840
    tags: ci_build shell
  sample.zigbee.shell.usb.nrf52833dk/nrf52833:
    build_only: true
    extra_args:
      CONF_FILE=prj_usb.conf
      DTC_OVERLAY_FILE="app_usb.overlay;boards/nrf52833dk/nrf52833.overlay"
    integration_platforms:
      - nrf52833dk/nrf52833
    platform_allow: nrf52833dk/nrf52833
    tags: ci_build shell
  sample.zigbee.shell.usb.nrf52840dongle/nrf52840:
    build_only: true
    extra_args:
      CONF_FILE=prj_usb.conf
      DTC_OVERLAY_FILE="app_usb.overlay;boards/nrf52840dongle/nrf52840.overlay"
    integration_platforms:
      - nrf52840dongle/nrf52840
    platform_allow: nrf52840dongle/nrf52840
    tags: ci_build shell
  sample.zigbee.shell.usb.nrf5340dk/nrf5340/cpuapp:
    build_only: true
    extra_args:
      CONF_FILE=prj_usb.conf
      DTC_OVERLAY_FILE="app_usb.overlay;boards/nrf5340dk/nrf5340/cpuapp.overlay"
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
    platform_allow: nrf5340dk/nrf5340/cpuapp
    tags: ci_build shell
