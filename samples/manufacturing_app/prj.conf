# Console and logging
CONFIG_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# LCS (Life Cycle State) subsystem
CONFIG_LCS=y
# Suppress INFO-level lcs log messages (e.g. "Performing LCS transition ...").
# The manufacturing app already logs the LCS state explicitly via MFG_LOG_KV,
# so the subsystem's informational messages are redundant. Errors are kept.
CONFIG_LCS_LOG_LEVEL_ERR=y

# nRF Security / CRACEN PSA Crypto driver
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_PSA_CRYPTO_DRIVER_OBERON=n
CONFIG_PSA_CRYPTO_DRIVER_CRACEN=y

# CRACEN Internal Key Generator (IKG seed provisioning)
CONFIG_CRACEN_IKG=y

# Do not auto-provision or push the protected RAM invalidation slots during
# psa_crypto_init(). The manufacturing app provisions slots 248/249 manually
# in Step 7. The push is deferred until after provisioning so that
# psa_crypto_init() succeeds on a virgin device.
CONFIG_CRACEN_PROVISION_PROT_RAM_INV_SLOTS_ON_INIT=n
CONFIG_CRACEN_PUSH_PROT_RAM_INV_SLOTS_ON_INIT=ns
# Allow Step 7 to provision slots 248/249 via psa_import_key(). CRACEN ignores
# the provided key material and generates 256 bits of hardware random data,
# provisioning both slots atomically.
# TODO: Update to use externally provided random data once the CRACEN driver
# supports importing caller-supplied material into PROTECTED-scheme slots.
CONFIG_CRACEN_PROVISION_PROT_RAM_INV_SLOTS_WITH_IMPORT=y

# Hardware Unique Key API (used to provision IKG seed with supplied data)
CONFIG_HW_UNIQUE_KEY=y
# Disable automatic seed generation on crypto init. The manufacturing app
# provisions the seed manually in Step 8.
CONFIG_HW_UNIQUE_KEY_WRITE_ON_CRYPTO_INIT=n

# PSA algorithms and key types needed by the manufacturing flow
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_PURE_EDDSA=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_ECC_TWISTED_EDWARDS_255=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_GENERATE_RANDOM=y

# Stack size
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Reboot support (used in Step 12)
CONFIG_REBOOT=y
