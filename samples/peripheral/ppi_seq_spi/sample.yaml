sample:
  description: Sample showing PPI sequencer with SPI
  name: SPI PPI sequencer sample
tests:
  sample.peripheral.ppi_seq_spi:
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "PPI Sequencer for SPI transfers .+"
        - "PPI sequence completed. Period: 1000, data received:\\d+, callback:\\d+, load:0.\\d%"
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
  sample.peripheral.ppi_seq_spi.ppr:
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "PPI Sequencer for SPI transfers .+"
        - "PPI sequence completed. Period: 1000, data received:\\d+, callback:\\d+, load:0.\\d%"
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - SB_CONFIG_RUN_PPRCORE=y
      - ppi_seq_spi_CONFIG_NRFX_GPPI=y
      - ppi_seq_spi_DTC_OVERLAY_FILE="boards/nrf54h20dk_nrf54h20_cpuapp_ppr.overlay"
