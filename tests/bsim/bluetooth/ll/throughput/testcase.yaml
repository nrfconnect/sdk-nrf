common:
  build_only: true
  tags:
    - bluetooth
  harness: bsim
  sysbuild: true

tests:
  bluetooth.ll.throughput:
    platform_allow:
      - nrf52_bsim/native
      - nrf5340bsim/nrf5340/cpunet
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15bsim/nrf54l15/cpuapp
    harness_config:
      bsim_exe_name: tests_bsim_bluetooth_ll_throughput_prj_conf
  bluetooth.ll.throughput.no_phy_update:
    platform_allow:
      - nrf52_bsim/native
      - nrf5340bsim/nrf5340/cpunet
      - nrf5340bsim/nrf5340/cpuapp
      - nrf54l15bsim/nrf54l15/cpuapp
    extra_args:
      - EXTRA_CONF_FILE=overlay-no_phy_update.conf
    harness_config:
      bsim_exe_name: tests_bsim_bluetooth_ll_throughput_prj_conf_overlay-no_phy_update_conf
