tests:
  benchmarks.stm_stress.all_cores:
    tags:
      - coresight_stm
      - ci_tests_benchmarks_multicore
    sysbuild: true
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    required_snippets:
      - nordic-log-stm
    extra_args:
      - SB_CONFIG_NETCORE_TESTAPP=y
      - SB_CONFIG_PPRCORE_TESTAPP=y
      - SB_CONFIG_FLPRCORE_TESTAPP=y
    harness: console
    harness_config:
      type: multi_line
      ordered: false
      regex:
        - ".*CoreSight STM initialized"
        - ".*Stm stress test: 65534"
