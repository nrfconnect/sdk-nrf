common:
  tags:
    - ci_tests_benchmarks_memory

tests:
  benchmarks.memory_access:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54h20dk/nrf54h20/cpurad
      - nrf54h20dk/nrf54h20/cpuppr
      - nrf54h20dk/nrf54h20/cpuflpr
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuflpr
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    harness: console
    harness_config:
      type: one_line
      ordered: true
      regex:
        - "Test PASS"

  benchmarks.memory_access.forbidden:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - FILE_SUFFIX=forbidden
    harness: console
    harness_config:
      type: one_line
      ordered: true
      regex:
        - "BUS FAULT"
