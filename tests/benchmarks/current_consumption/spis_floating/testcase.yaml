common:
  depends_on: spi
  tags:
    - ci_tests_benchmarks_current_consumption
    - ppk_power_measure
  harness: pytest
  harness_config:
    fixture: ppk_power_measure
    pytest_root:
      - "${CUSTOM_ROOT_TEST_DIR}/test_measure_power_consumption.py::test_measure_current_consumption_spis_floating"
  platform_allow:
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54lm20dk/nrf54lm20b/cpuapp
  integration_platforms:
    - nrf54l15dk/nrf54l15/cpuapp
  platform_exclude:
    - nrf54ls05dk/nrf54ls05a/cpuapp # Device do NOT have low power SPI30
    - nrf54ls05dk/nrf54ls05b/cpuapp # Device do NOT have low power SPI30
    - nrf54lv10dk/nrf54lv10a/cpuapp # Must NOT be powered from 3V
    - nrf54lc10dk/nrf54lc10a/cpuapp # Must NOT be powered from 3V

tests:
  benchmarks.current_consumption.spis_floating: {}
  benchmarks.current_consumption.spis_floating.fix:
    extra_args:
      - FILE_SUFFIX=fix
