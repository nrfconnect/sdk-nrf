tests:
  sd.mmc.semmc:
    tags:
      - drivers
      - sdhc
      - ci_tests_subsys_sd
    harness: ztest
    harness_config:
      fixture: semmc
    filter: dt_alias_exists("sdhc0") and dt_compat_enabled("nordic,nrf-semmc")
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
