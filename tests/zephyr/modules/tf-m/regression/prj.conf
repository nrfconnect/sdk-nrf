CONFIG_TFM_SECURE_UART_SHARE_INSTANCE=n

# Enable IPC mode and isolation level 2 by default
CONFIG_TFM_IPC=y
CONFIG_TFM_ISOLATION_LEVEL=2

# PSA_WANTs not supported (and so not enabled) by Zephyr

CONFIG_PSA_WANT_GENERATE_RANDOM=y

CONFIG_PSA_WANT_RSA_KEY_SIZE_1024=y
CONFIG_PSA_WANT_RSA_KEY_SIZE_2048=y
CONFIG_PSA_WANT_RSA_KEY_SIZE_3072=y
