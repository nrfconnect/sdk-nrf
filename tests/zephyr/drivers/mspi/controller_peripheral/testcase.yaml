common:
  depends_on: spi
  tags:
    - drivers
    - spi
    - mspi
    - ci_tests_drivers_hpf
  harness: ztest
  harness_config:
    fixture: hpf_mspi_spi_loopback
  platform_allow:
    - nrf54l15dk/nrf54l15/cpuapp
  integration_platforms:
    - nrf54l15dk/nrf54l15/cpuapp

tests:
  drivers.mspi.spi_mode0:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=0
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_spis.overlay boards/250khz.overlay"

  drivers.mspi.spi_mode3:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=3
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_spis.overlay boards/2mhz.overlay"

  drivers.mspi.spi_4MHz:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=0
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_spis.overlay boards/4mhz.overlay"

  drivers.mspi.spi_8MHz:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=3
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_spis.overlay boards/8mhz.overlay"
