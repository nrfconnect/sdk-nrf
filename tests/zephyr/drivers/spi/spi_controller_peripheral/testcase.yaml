common:
  # depends_on: spi
  tags:
    - drivers
    - spi
    - ci_tests_zephyr_drivers_spi
  harness: ztest
  harness_config:
    fixture: gpio_spi_loopback
  timeout: 15
  platform_allow:
    - nrf54ls05dk/nrf54ls05a/cpuapp
    - nrf54ls05dk/nrf54ls05b/cpuapp
    - nrf54lv10dk/nrf54lv10a/cpuapp
    - nrf54lv10dk/nrf54lv10a/cpuapp/ns
    - nrf9251dk/nrf9251/cpuapp
    - nrf9251dk/nrf9251/cpuppr

tests:
  nrf.extended.drivers.spi.spi_mode0:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=0
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/250khz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_mode1:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=1
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/500khz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_mode2:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=2
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/1mhz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_mode3:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=3
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/2mhz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_1M333333Hz:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=0
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/1m333333hz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_2M666666Hz:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=0
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/2m666666hz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_4MHz:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=2
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/4mhz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.spi_8MHz:
    extra_configs:
      - CONFIG_TESTED_SPI_MODE=1
    extra_args: EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_TEST_DIR}/8mhz.overlay"
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  # No Fast SPI instance on nrf54ls05a/b
  # No Fast SPI instance on nrf54lv10a, nor nrf54lc10a
  # Missing test setup for nrf9251dk SPI fast instance

  nrf.extended.drivers.spi.pm_runtime:
    extra_configs:
      - CONFIG_PM_DEVICE=y
      - CONFIG_PM_DEVICE_RUNTIME=y
    integration_platforms:
      - nrf54ls05dk/nrf54ls05b/cpuapp

  nrf.extended.drivers.spi.direct_xfer:
    extra_configs:
      - CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=0

  nrf.extended.drivers.spi.direct_xfer.no_prealloc:
    extra_configs:
      - CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=0
      - CONFIG_PREALLOC_BUFFERS=n
