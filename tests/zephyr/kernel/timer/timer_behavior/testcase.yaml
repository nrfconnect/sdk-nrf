tests:
  nrf.extended.kernel.timer.timer:
    tags:
      - kernel
      - timer
      - ci_tests_zephyr_kernel_timer_timer_behavior
    min_ram: 16
    platform_type:
      - mcu
    simulation_exclude:
      - renode
    harness_config:
      record:
        regex: "RECORD:(?P<metrics>.*)"
        as_json: ['metrics']
    platform_allow:
      - nrf54lm20apdk/nrf54lm20a/cpuapp
      - nrf54lv10apdk/nrf54lv10a/cpuapp
    integration_platforms:
      - nrf54lm20apdk/nrf54lm20a/cpuapp
      - nrf54lv10apdk/nrf54lv10a/cpuapp
