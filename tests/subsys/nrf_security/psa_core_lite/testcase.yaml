tests:
  # PSA core lite: Ed25519
  psa_core_lite.ed25519:
    sysbuild: true
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
    tags:
      - sysbuild
      - crypto
      - ci_crypto
      - ci_tests_crypto
    extra_args: >
      EXTRA_CONF_FILE="eddsa.conf"
  # PSA core lite: ECDSA
  psa_core_lite.ecdsa:
    sysbuild: true
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
