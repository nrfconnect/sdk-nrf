tests:
  fw_info.core:
    sysbuild: true
    platform_allow:
      - nrf9160dk/nrf9160
      - nrf52840dk/nrf52840
      - nrf52dk/nrf52832
      - nrf5340dk/nrf5340/cpuapp
    integration_platforms:
      - nrf52840dk/nrf52840
    tags:
      - b0
      - fw_info
      - sysbuild
      - ci_tests_subsys_fw_info
  fw_info.core.no_pm:
    sysbuild: true
    platform_allow:
      - nrf9160dk/nrf9160
      - nrf52840dk/nrf52840
      - nrf52dk/nrf52832
      - nrf5340dk/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf52840dk/nrf52840
    extra_args:
      - SB_CONFIG_PARTITION_MANAGER=n
    tags:
      - b0
      - fw_info
      - sysbuild
      - ci_tests_subsys_fw_info
