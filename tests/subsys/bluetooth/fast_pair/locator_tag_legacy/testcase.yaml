common:
  tags:
    - sysbuild
    - bluetooth
    - ci_tests_subsys_bluetooth_fast_pair
tests:
  test.bluetooth.fast_pair.locator_tag_legacy.fast_pair_api_legacy.pm_legacy:
    sysbuild: true
    build_only: true
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf5340dk/nrf5340/cpuapp
      - nrf52840dk/nrf52840
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf5340dk/nrf5340/cpuapp
      - nrf52840dk/nrf52840
    extra_args:
      - CONFIG_DEPRECATION_TEST=y
      - SB_CONFIG_COMPILER_WARNINGS_AS_ERRORS=n
