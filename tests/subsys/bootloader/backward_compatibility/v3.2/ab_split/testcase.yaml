common:
  sysbuild: true
  build_only: true
  tags:
    - mcumgr
    - ci_tests_subsys_bootloader

# Power management had to be disabled (CONFIG_PM=n)
# Incompatibility introduced in commit 928502252c

tests:
  mcuboot.backward_compatibility.ab_split:
    extra_configs:
      - CONFIG_MCUMGR_GRP_IMG_ALLOW_CONFIRM_NON_ACTIVE_IMAGE_ANY=y
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
