common:
  sysbuild: true
  harness: ztest
  harness_config:
    fixture: gpio_spi_loopback
  tags:
    - drivers
    - spi
    - i2c
    - ci_tests_lib_ppi_seq
tests:
  lib.ppi_seq_i2c_spi.i2c:
    depends_on: i2c
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
  lib.ppi_seq_i2c_spi.spi_timer_trigger:
    depends_on: spi
    extra_args:
      - DTC_OVERLAY_FILE="boards/nrf54lm20dk_nrf54lm20a_cpuapp_spi_timer.overlay"
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
  lib.ppi_seq_i2c_spi.spi_extra_op:
    depends_on: spi
    extra_args:
      - DTC_OVERLAY_FILE="boards/nrf54lm20dk_nrf54lm20a_cpuapp_spi_timer_extra_op.overlay"
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
  lib.ppi_seq_i2c_spi.spi_timer_notifier:
    depends_on: spi
    extra_args:
      - DTC_OVERLAY_FILE="boards/nrf54lm20dk_nrf54lm20a_cpuapp_spi_timer_notifier.overlay"
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
  lib.ppi_seq_i2c_spi.i2c_timer_notifier_counter:
    depends_on: i2c
    extra_args:
      - DTC_OVERLAY_FILE="boards/nrf54lm20dk_nrf54lm20a_cpuapp_i2c_timer_notifier_counter.overlay"
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
  lib.ppi_seq_i2c_spi.spi_rtc:
    depends_on: spi
    extra_args:
      - DTC_OVERLAY_FILE="boards/nrf54h20dk_nrf54h20_cpuapp_spi_rtc.overlay"
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
