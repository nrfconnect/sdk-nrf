# DECT NR+ Stack Integration Test Configuration for native_sim
# Tests complete stack from net_mgmt API to mocked libmodem

# Unity Test Framework
CONFIG_UNITY=y

# Code Coverage Support (for native_sim) - focus on DECT stack
# Disabled by default - enable when running coverage measurement
# Twister coverage commands in README enable these when needed
#CONFIG_COVERAGE=y
#CONFIG_COVERAGE_NATIVE_GCOV=y

# Basic configuration for Unity testing on native_sim
CONFIG_TEST=y
CONFIG_ZTEST=n

# System configuration for DECT stack testing
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Networking configuration for DECT integration testing
# Note: CONFIG_NRF_MODEM_LIB is NOT enabled - all modem functions are mocked
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=n
CONFIG_NET_IPV6=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
# Must be >= largest DECT event (dect_neighbor_list_evt in BUILD_ASSERT; dect_neighbor_info_evt
# is larger). On native_sim (64-bit) alignment makes that 224 bytes; dect_shell on 32-bit nRF91x
# fits in 208. Use 224 so this test passes on native_sim.
CONFIG_NET_MGMT_EVENT_INFO_DEFAULT_DATA_SIZE=224

# DECT L2 layer
CONFIG_NET_L2_DECT=y
CONFIG_NET_CONNECTION_MANAGER=y

# Packet sockets for raw DECT L2 send/receive test
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_PACKET=y
CONFIG_NET_SOCKETS_PACKET_DGRAM=y

# Note: Modem library CONFIG values are mocked via compile definitions in CMakeLists.txt

# DECT NR+ specific configurations with full MAC driver stack
CONFIG_DECT=y
CONFIG_DECT_MDM=y
CONFIG_DECT_MDM_DRIVER_NRF=y
CONFIG_DECT_CLUSTER_MAX_CHILD_ASSOCIATION_COUNT=8
CONFIG_NET_IPV6_MAX_NEIGHBORS=8
CONFIG_DECT_MDM_LOG_LEVEL_INF=y
CONFIG_DECT_MDM_DEVICE_NAME="dect_test"
CONFIG_DECT_MDM_NET_IF_NO_AUTO_START=n

# Modem shared memory configuration (defined in Kconfig)

# DECT L2 networking layer
CONFIG_NET_L2_DECT_MGMT=y
CONFIG_NET_L2_DECT_LOG_LEVEL_INF=y
CONFIG_NET_L2_DECT_MGMT_LOG_LEVEL_INF=y
CONFIG_NET_L2_DECT_BR=y

CONFIG_NET_LOG=y

# Suppress informational messages from DECT Bearer layer (like "Ethernet interface found")
CONFIG_NET_L2_DECT_BR_LOG_LEVEL_INF=n
CONFIG_NET_L2_DECT_BR_LOG_LEVEL_WRN=y

# Network management event logging
CONFIG_NET_MGMT_EVENT_LOG_LEVEL_INF=y

# Disable Ethernet L2 layer (not needed for DECT MAC testing)
CONFIG_NET_L2_ETHERNET=n

CONFIG_NET_INTERFACE_NAME=y
CONFIG_NET_INTERFACE_NAME_LEN=15
CONFIG_NET_IF_MAX_IPV6_COUNT=2

# Network buffers
CONFIG_NET_BUF=y
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_BUF_POOL_USAGE=y
CONFIG_NET_PKT_RX_COUNT=15
CONFIG_NET_BUF_RX_COUNT=30
CONFIG_NET_PKT_TX_COUNT=15
CONFIG_NET_BUF_TX_COUNT=30

# Network stack sizes
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# Network context support
CONFIG_NET_CONTEXT_SNDTIMEO=y
CONFIG_NET_CONTEXT_RCVTIMEO=y

# System configuration
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_HEAP_MEM_POOL_SIZE=25600

# Logging and debugging
CONFIG_ASSERT=y
CONFIG_LOG=y

# Test module logging (change to DBG to enable debug traces from tests)
CONFIG_TEST_DECT_INTEGRATION_LOG_LEVEL_INF=y
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_ASSERT_VERBOSE=y
CONFIG_RESET_ON_FATAL_ERROR=n

# Enhanced logging for threading visibility
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=10
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0

# Thread debugging support
CONFIG_THREAD_NAME=y

# Kernel options
CONFIG_ENTROPY_GENERATOR=y

# Settings for state persistence
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Additional required configurations for DECT stack
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_USER_API=y

# Disable antenna and modem info
CONFIG_MODEM_ANTENNA=n
CONFIG_MODEM_INFO=n

# Disable components that require hardware for testing
CONFIG_MBEDTLS=n
CONFIG_NORDIC_SECURITY_BACKEND=n
