common:
  sysbuild: true
  depends_on: gpio
  harness: ztest
  tags:
    - drivers
    - spim
    - ci_tests_drivers_spi

tests:
  drivers.spim_pan:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf54ls05dk/nrf54ls05a/cpuapp
      - nrf54ls05dk/nrf54ls05b/cpuapp
      - nrf54lv10dk/nrf54lv10a/cpuapp
      - nrf54lc10dk/nrf54lc10a/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
    harness_config:
      fixture: gpio_loopback

  drivers.spim_pan.fast:
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    extra_args:
      - DTC_OVERLAY_FILE='boards/nrf54lxx_cpuapp_fast.overlay'
    harness_config:
      fixture: external_flash

  drivers.spim_pan.fast.nrf54h:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - DTC_OVERLAY_FILE='boards/nrf54h20dk_nrf54h20_cpuapp_fast.overlay'
    harness_config:
      fixture: gpio_loopback
