common:
  tags:
    - drivers
    - ci_tests_drivers_timer
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Tests status: PASS"
  timeout: 45

tests:
  drivers.timer.lfclk_accuracy:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l05/cpuapp
      - nrf54l15dk/nrf54l10/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf54ls05dk/nrf54ls05a/cpuapp
      - nrf54ls05dk/nrf54ls05b/cpuapp
      - nrf54lv10dk/nrf54lv10a/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
    extra_args:
      - CONFIG_TEST_GRTC_TIMER_INTERVAL_US=4000
      - CONFIG_TEST_DURATION_MS=20000
      - CONFIG_TEST_ABS_TIMIMG_DEVIATION_US=1

  drivers.timer.lfclk_accuracy.lfrc_nrf54l:
    platform_allow:
      - nrf54l15dk/nrf54l05/cpuapp
      - nrf54l15dk/nrf54l10/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf54ls05dk/nrf54ls05a/cpuapp
      - nrf54ls05dk/nrf54ls05b/cpuapp
      - nrf54lv10dk/nrf54lv10a/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
    extra_args:
      - CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
      - CONFIG_TEST_GRTC_TIMER_INTERVAL_US=4000
      - CONFIG_TEST_DURATION_MS=20000
      - CONFIG_TEST_ABS_TIMIMG_DEVIATION_US=150

  drivers.timer.lfclk_accuracy.lfrc_nrf54h:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - CONFIG_TEST_GRTC_TIMER_INTERVAL_US=4000
      - CONFIG_TEST_DURATION_MS=20000
      - CONFIG_TEST_ABS_TIMIMG_DEVIATION_US=3
    harness: console
    harness_config:
      fixture: lfclk_at_lfrc
      type: multi_line
      regex:
        - "Tests status: PASS"
