common:
  tags:
    - ci_tests_drivers_hpf
    - drivers
    - mspi
  harness: ztest

tests:
  drivers.mspi.hpf_app_fault_timer:
    harness_config:
      fixture: external_flash
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
  drivers.mspi.hpf_app_fault_timer.emul_mspi_dev:
    platform_allow:
      - nrf54lv10dk/nrf54lv10a/cpuapp
    integration_platforms:
      - nrf54lv10dk/nrf54lv10a/cpuapp
    extra_args:
      - EXTRA_DTC_OVERLAY_FILE="boards/emul_device.overlay"
