common:
  tags:
    - drivers
    - gpio
  depends_on: gpio
  filter: not CONFIG_COVERAGE
  harness: ztest
  harness_config:
    fixture: gpio_loopback

tests:
  drivers.gpio.gpio_loopbacks.five_loops:
    extra_configs:
      - CONFIG_NUMBER_OF_LOOPBACKS=5
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
