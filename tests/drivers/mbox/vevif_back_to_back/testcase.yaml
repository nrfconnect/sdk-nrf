common:
  sysbuild: true
  tags:
    - mbox
    - vevif
    - multicore
  timeout: 120

tests:
  drivers.mbox.vevif_back_to_back.nrf54lm20b.task:
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    build_only: true
    extra_args:
      - SB_CONF_FILE=sysbuild/nrf54lm20dk_nrf54lm20b_cpuflpr.conf

  drivers.mbox.vevif_back_to_back.nrf54lm20b.reverse:
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    extra_args:
      - SB_CONF_FILE=sysbuild/nrf54lm20dk_nrf54lm20b_cpuflpr.conf
      - CONFIG_REPRO_MODE_REVERSE_BURST=y
      - remote_CONFIG_REPRO_MODE_REVERSE_BURST=y
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "RESULT PASS mode=reverse-burst .*"

  drivers.mbox.vevif_back_to_back.nrf54lm20b.task.reliable:
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    build_only: true
    extra_args:
      - SB_CONF_FILE=sysbuild/nrf54lm20dk_nrf54lm20b_cpuflpr.conf
      - EXTRA_DTC_OVERLAY_FILE=boards/nrf54lm20dk_nrf54lm20b_cpuapp_reliable.overlay
      - remote_EXTRA_DTC_OVERLAY_FILE=boards/nrf54lm20dk_nrf54lm20b_cpuflpr_reliable.overlay

  drivers.mbox.vevif_back_to_back.nrf54lm20b.reverse.reliable:
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    extra_args:
      - SB_CONF_FILE=sysbuild/nrf54lm20dk_nrf54lm20b_cpuflpr.conf
      - CONFIG_REPRO_MODE_REVERSE_BURST=y
      - remote_CONFIG_REPRO_MODE_REVERSE_BURST=y
      - EXTRA_DTC_OVERLAY_FILE=boards/nrf54lm20dk_nrf54lm20b_cpuapp_reliable.overlay
      - remote_EXTRA_DTC_OVERLAY_FILE=boards/nrf54lm20dk_nrf54lm20b_cpuflpr_reliable.overlay
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "RESULT PASS mode=reverse-burst .*"

  drivers.mbox.vevif_back_to_back.nrf54h20.task:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    build_only: true
    extra_args:
      - SB_CONF_FILE=sysbuild/nrf54h20dk_nrf54h20_cpuflpr.conf

  drivers.mbox.vevif_back_to_back.nrf54h20.reverse:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    extra_args:
      - SB_CONF_FILE=sysbuild/nrf54h20dk_nrf54h20_cpuflpr.conf
      - CONFIG_REPRO_MODE_REVERSE_BURST=y
      - remote_CONFIG_REPRO_MODE_REVERSE_BURST=y
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "RESULT PASS mode=reverse-burst .*"
