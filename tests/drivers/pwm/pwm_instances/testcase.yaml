common:
  tags:
    - drivers
    - ci_tests_drivers_pwm
  harness: ztest
  timeout: 20

tests:
  drivers.pwm.pwm_instances:
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf54h20dk/nrf54h20/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf54ls05dk/nrf54ls05a/cpuapp
      - nrf54ls05dk/nrf54ls05b/cpuapp
      - nrf7120dk/nrf7120/cpuapp
      - nrf9251dk/nrf9251/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp

  drivers.pwm.pwm_instances.cpuflpr:
    sysbuild: true
    required_snippets:
      - nordic-log-stm
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuflpr
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuflpr
    extra_args:
      - DTC_OVERLAY_FILE="boards/nrf54h20dk_nrf54h20_cpuflpr.overlay"
      - vpr_launcher_EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_NRF_MODULE_DIR}/tests/drivers/pwm/pwm_instances/boards/nrf54h20dk_nrf54h20_cpuflpr_launcher.overlay"
      - vpr_launcher_SNIPPET=nordic-log-stm
      - Dvpr_launcher_CONFIG_BOOT_BANNER=n
