sample:
  name: nRF Audio application
  description: LE Audio and Auracast implementation example
tests:
  applications.nrf_audio.headset_unicast_unidir_usb:
    integration_platforms:
      - nrf5340_audio_dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
    platform_allow:
      - nrf5340_audio_dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
    sysbuild: true
    build_only: true
    tags:
      - ci_build
      - sysbuild
      - ci_applications_nrf_audio
    extra_args:
      - EXTRA_CONF_FILE=unicast_server/overlay-unicast_server.conf
  applications.nrf_audio.gateway_unicast_bidir_usb:
    integration_platforms:
      - nrf5340_audio_dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
    platform_allow:
      - nrf5340_audio_dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
    sysbuild: true
    build_only: true
    tags:
      - ci_build
      - sysbuild
      - ci_applications_nrf_audio
    extra_args:
      - CONFIG_STREAM_BIDIRECTIONAL=y
      - EXTRA_CONF_FILE=unicast_client/overlay-unicast_client.conf
  applications.nrf_audio.headset_broadcast_sink_usb:
    integration_platforms:
      - nrf5340_audio_dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
    platform_allow:
      - nrf5340_audio_dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpuapp
    sysbuild: true
    build_only: true
