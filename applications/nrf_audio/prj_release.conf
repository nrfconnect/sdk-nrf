# nRF Audio
CONFIG_APP_NRF_AUDIO=y

CONFIG_SAMPLE_RATE_CONVERTER=y
CONFIG_SAMPLE_RATE_CONVERTER_FILTER_SIMPLE=y

# General
CONFIG_DEBUG=n
CONFIG_ASSERT=n
CONFIG_STACK_USAGE=n
CONFIG_THREAD_MONITOR=n
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_UART_CONSOLE=n
CONFIG_BOOT_BANNER=n
CONFIG_NET_BUF_POOL_USAGE=y
CONFIG_BT_RX_STACK_SIZE=2500
CONFIG_POLL=y

# BT related configs
CONFIG_BT_ISO_TX_BUF_COUNT=3
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_ATT_TX_COUNT=12

CONFIG_SPEED_OPTIMIZATIONS=y

# Enable link-time-optimizations to improve performance and reduce size
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
