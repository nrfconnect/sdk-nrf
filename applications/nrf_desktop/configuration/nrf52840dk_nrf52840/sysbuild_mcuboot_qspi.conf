SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="\${APPLICATION_CONFIG_DIR}/images/mcuboot/mcuboot_private.pem"

# The configuration uses the DTS-based memory map.
SB_CONFIG_PARTITION_MANAGER=n
# Uncomment the option below if you re-enable the Partition Manager
# (SB_CONFIG_PARTITION_MANAGER=y) to place the MCUboot secondary slot
# in the external flash.
# SB_CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
