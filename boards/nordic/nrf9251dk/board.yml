board:
  full_name: nRF9251 DK
  name: nrf9251dk
  vendor: nordic
  socs:
  - name: nrf9251
    variants:
    - name: xip
      cpucluster: cpuppr
    - name: xip
      cpucluster: cpuflpr
  revision:
    format: major.minor.patch
    default: "0.1.0"
    revisions:
    - name: "0.1.0"
runners:
  run_once:
    '--recover':
    - runners:
      - nrfutil
      run: first
      groups:
      - boards:
        - nrf9251dk@0.1.0/nrf9251/cpuapp
        - nrf9251dk@0.1.0/nrf9251/cpuppr
        - nrf9251dk@0.1.0/nrf9251/cpuppr/xip
        - nrf9251dk@0.1.0/nrf9251/cpuflpr
        - nrf9251dk@0.1.0/nrf9251/cpuflpr/xip
    '--erase':
    - runners:
      - jlink
      - nrfutil
      run: first
      groups:
      - boards:
        - nrf9251dk@0.1.0/nrf9251/cpuapp
        - nrf9251dk@0.1.0/nrf9251/cpuppr
        - nrf9251dk@0.1.0/nrf9251/cpuppr/xip
        - nrf9251dk@0.1.0/nrf9251/cpuflpr
        - nrf9251dk@0.1.0/nrf9251/cpuflpr/xip
    '--reset':
    - runners:
      - jlink
      - nrfutil
      run: last
      groups:
      - boards:
        - nrf9251dk@0.1.0/nrf9251/cpuapp
        - nrf9251dk@0.1.0/nrf9251/cpuppr
        - nrf9251dk@0.1.0/nrf9251/cpuppr/xip
        - nrf9251dk@0.1.0/nrf9251/cpuflpr
        - nrf9251dk@0.1.0/nrf9251/cpuflpr/xip
