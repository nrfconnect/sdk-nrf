CONFIG_MBEDTLS_HEAP_SIZE=70000
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=12000
CONFIG_WIFI_CREDENTIALS_RUNTIME_CERTIFICATES=y
CONFIG_WIFI_SHELL_RUNTIME_CERTIFICATES=y
