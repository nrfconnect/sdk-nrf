<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="480px" height="180px" viewBox="30 0 480 180" xml:space="preserve">
	<style type="text/css">
	<![CDATA[
		.box1 { fill: #0033a0; stroke: none; }
		.box2 { fill: #0033a0; stroke: none; }
		.box3 { fill: #de823b; stroke: none; }
		.box-text { fill: #ffffff; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
		.arrow-line { stroke: #008bab; stroke-width: 1.5; fill: none; }
		.arrow-head { fill: #008bab; }
		.evolution-text-plain { fill: #333f48; font-family: Arial, sans-serif; font-size: 12px; }
		.separator-line { stroke: #333f48; stroke-width: 1; fill: none; }
		.caption-text { fill: #333f48; font-family: Arial, sans-serif; font-size: 11px; font-weight: normal; }
	]]>
	</style>
	<defs>
		<marker id="arrowhead" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
			<polygon points="0 0, 8 3, 0 6" class="arrow-head"/>
		</marker>
	</defs>

	<!-- Box 1: AP-Protect (hardware) -->
	<rect x="40" y="20" width="220" height="52" rx="2" class="box1"/>
	<text x="150" y="38" class="box-text" text-anchor="middle"><tspan x="150" dy="0">AP-Protect</tspan><tspan x="150" dy="1.2em">(hardware only)</tspan></text>

	<!-- Arrow 1 + Evolution -->
	<line x1="150" y1="72" x2="150" y2="98" class="arrow-line" marker-end="url(#arrowhead)"/>
	<text x="168" y="90" class="evolution-text-plain">Evolution</text>

	<!-- Box 2: Hardware + Software AP-Protect -->
	<rect x="40" y="108" width="220" height="52" rx="2" class="box2"/>
	<text x="150" y="126" class="box-text" text-anchor="middle"><tspan x="150" dy="0">AP-Protect</tspan><tspan x="150" dy="1.2em">(hardware and software)</tspan></text>

	<!-- Vertical separator between groupings -->
	<line x1="270" y1="20" x2="270" y2="160" class="separator-line"/>

	<!-- Right grouping: Secure AP-Protect -->
	<text x="390" y="88" class="caption-text" text-anchor="middle"><tspan x="390" dy="0">Devices with security by separation</tspan><tspan x="390" dy="1.2em">(TrustZone)</tspan></text>
	<rect x="280" y="108" width="220" height="52" rx="2" class="box3"/>
	<text x="390" y="126" class="box-text" text-anchor="middle"><tspan x="390" dy="0">Secure AP-Protect</tspan><tspan x="390" dy="1.2em">(hardware and software)</tspan></text>
</svg>
