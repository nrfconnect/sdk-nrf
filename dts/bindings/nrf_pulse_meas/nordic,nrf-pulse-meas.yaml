description: Nordic Nrf Pulse Measurement

compatible: "nordic,nrf-pulse-meas"

include: base.yaml

properties:
  gpiote-instance:
    required: true
    type: phandle
    description: |
      GPIOTE instance.

  timer-instance:
    required: true
    type: phandle
    description: |
      Timer instance.

  rising-pin:
    type: int
    required: true

  falling-pin:
    type: int
    required: true
