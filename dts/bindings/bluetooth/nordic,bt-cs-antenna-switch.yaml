description: |
  This is an abstract representation of a generic antenna switching board
  which is controlled by GPIO pins. Up to four antenna ports (ANT1-4) are defined.

compatible: "nordic,bt-cs-antenna-switch"

include: base.yaml

properties:
  multiplexing-mode:
    type: int
    description: |
      Multiplexing mode. This setting determines whether or not the switching board
      is controlled using a one-to-one mapping between GPIOs and antennas.
      The possible values are:
      0: (default) One-to-one mapping. Each GPIO selects one antenna.
        Only one GPIO is active at a time.
      1: Multiplexed mapping. Antenna selection is derived from the state of all
        GPIOs. Example: two GPIOs select between four antennas.

  ant-gpios:
    type: phandle-array
    required: true
    description: |
      Array of GPIOs corresponding to <ANT1, ANT2, ANT3, ANT4>.
      At least one GPIO is needed.
